<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Neon Vault X</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top,#7c3aed 0%,#4c1d95 35%,#0f172a 100%);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
}

/* BACKGROUND */

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.ball{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.4;
    animation:float 8s infinite ease-in-out;
}

.ball1{
    width:300px;
    height:300px;
    background:#9333ea;
    top:-80px;
    left:-80px;
}

.ball2{
    width:350px;
    height:350px;
    background:#3b82f6;
    bottom:-100px;
    right:-100px;
}

.ball3{
    width:250px;
    height:250px;
    background:#ec4899;
    top:40%;
    left:50%;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(25px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* CONTAINER */

.container{
    width:100%;
    max-width:1500px;
    margin:auto;
    padding:30px;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    margin-bottom:35px;
}

.logo h1{
    font-size:50px;
    font-weight:800;
    background:
    linear-gradient(
    90deg,
    #ffffff,
    #c084fc,
    #60a5fa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.logo p{
    color:#cbd5e1;
    margin-top:8px;
}

.online{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    padding:14px 22px;
    border-radius:18px;
    backdrop-filter:blur(14px);
    color:#d8b4fe;
    font-weight:700;
}

/* MAIN */

.main{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:25px;
}

@media(max-width:1050px){

    .main{
        grid-template-columns:1fr;
    }

}

/* GLASS */

.glass{
    background:rgba(15,23,42,0.7);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:32px;
    padding:28px;
    backdrop-filter:blur(20px);
    box-shadow:
    0 15px 40px rgba(0,0,0,0.45);
}

/* PREVIEW */

.preview{
    text-align:center;
    margin-bottom:30px;
}

.preview img{
    width:190px;
    height:190px;
    border-radius:35px;
    object-fit:cover;
    border:5px solid #a855f7;
    box-shadow:
    0 0 40px rgba(168,85,247,0.5);
    transition:0.3s;
}

.preview img:hover{
    transform:scale(1.05);
}

.preview h2{
    margin-top:20px;
    font-size:32px;
}

.preview p{
    color:#cbd5e1;
    margin-top:5px;
}

/* INPUT */

.label{
    display:block;
    margin-bottom:10px;
    color:#d8b4fe;
    font-size:14px;
}

.input-box{
    margin-bottom:22px;
}

input,
textarea{
    width:100%;
    border:none;
    outline:none;
    padding:17px;
    border-radius:18px;
    background:#1e293b;
    color:white;
    font-size:15px;
    transition:0.25s;
}

textarea{
    min-height:120px;
    resize:none;
}

input:focus,
textarea:focus{
    background:#263449;
    box-shadow:
    0 0 0 4px rgba(168,85,247,0.3);
}

/* BUTTON */

.save-btn{
    width:100%;
    border:none;
    padding:18px;
    border-radius:20px;
    background:
    linear-gradient(
    135deg,
    #9333ea,
    #7c3aed,
    #3b82f6);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.save-btn:hover{
    transform:translateY(-3px);
    box-shadow:
    0 15px 35px rgba(168,85,247,0.45);
}

/* DASHBOARD */

.dashboard-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
    flex-wrap:wrap;
    gap:15px;
}

.dashboard-top h2{
    font-size:34px;
}

.total{
    padding:12px 20px;
    border-radius:16px;
    background:rgba(168,85,247,0.15);
    border:1px solid rgba(168,85,247,0.25);
    color:#d8b4fe;
    font-weight:700;
}

/* SEARCH */

.search-box{
    margin-bottom:25px;
}

.search-box input{
    background:#111827;
}

/* CARDS */

.accounts{
    display:grid;
    grid-template-columns:
    repeat(auto-fill,minmax(300px,1fr));
    gap:24px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:30px;
    padding:24px;
    background:
    linear-gradient(
    180deg,
    #111827,
    #1e1b4b);
    border:1px solid rgba(255,255,255,0.08);
    transition:0.35s;
    animation:show 0.4s ease;
}

.card:hover{
    transform:translateY(-8px);
    border-color:#a855f7;
    box-shadow:
    0 15px 35px rgba(0,0,0,0.45);
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:5px;
    background:
    linear-gradient(
    90deg,
    #a855f7,
    #3b82f6);
}

.card img{
    width:120px;
    height:120px;
    border-radius:30px;
    object-fit:cover;
    border:4px solid #a855f7;
    margin-bottom:18px;
}

.card h3{
    font-size:28px;
    margin-bottom:10px;
}

.bio{
    color:#cbd5e1;
    line-height:1.6;
    margin-bottom:20px;
    min-height:85px;
}

.visit-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    padding:15px;
    border-radius:18px;
    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #3b82f6);
    color:white;
    font-weight:700;
    transition:0.25s;
    margin-bottom:10px;
}

.visit-btn:hover{
    transform:scale(1.03);
}

.delete-btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:16px;
    background:#ef4444;
    color:white;
    font-weight:700;
    cursor:pointer;
}

.delete-btn:hover{
    background:#dc2626;
}

.empty{
    text-align:center;
    color:#cbd5e1;
    padding:60px 20px;
}

.footer{
    text-align:center;
    margin-top:45px;
    color:#cbd5e1;
}

@keyframes show{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<div class="bg">

    <div class="ball ball1"></div>
    <div class="ball ball2"></div>
    <div class="ball ball3"></div>

</div>

<div class="container">

    <div class="header">

        <div class="logo">

            <h1>🎮 ROBLOX NEON VAULT X</h1>

            <p>
                Dashboard komunitas Roblox paling modern.
            </p>

        </div>

        <div class="online">

            ● ONLINE COMMUNITY

        </div>

    </div>

    <div class="main">

        <!-- LEFT -->

        <div class="glass">

            <div class="preview">

                <img
                id="avatar"
                src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-310x310-Png/placeholder/Png/noFilter">

                <h2 id="previewName">

                    Roblox User

                </h2>

                <p>

                    Live Roblox Avatar Preview

                </p>

            </div>

            <label class="label">
                Username Roblox
            </label>

            <div class="input-box">

                <input
                type="text"
                id="username"
                placeholder="Masukkan username Roblox">

            </div>

            <label class="label">
                Bio / Deskripsi
            </label>

            <div class="input-box">

                <textarea
                id="bio"
                placeholder="Contoh: Blox Fruits Player"></textarea>

            </div>

            <!-- UPLOAD FOTO -->

            <label class="label">
                Upload Foto Custom
            </label>

            <div class="input-box">

                <input
                type="file"
                id="photo"
                accept="image/*">

            </div>

            <button
            class="save-btn"
            onclick="saveAccount()">

                + Tambahkan Profil

            </button>

        </div>

        <!-- RIGHT -->

        <div class="glass">

            <div class="dashboard-top">

                <h2>Community Dashboard</h2>

                <div class="total">

                    <span id="totalAccounts">0</span>

                    Profile

                </div>

            </div>

            <div class="search-box">

                <input
                type="text"
                id="search"
                placeholder="Cari username...">

            </div>

            <div
            class="accounts"
            id="accounts">

            </div>

        </div>

    </div>

    <div class="footer">

        © 2026 Roblox Neon Vault X

    </div>

</div>

<!-- SOUND -->

<audio id="successSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.mp3" type="audio/mpeg">
</audio>

<script>

/* ELEMENT */

const usernameInput =
document.getElementById("username");

const avatar =
document.getElementById("avatar");

const previewName =
document.getElementById("previewName");

const totalAccounts =
document.getElementById("totalAccounts");

const successSound =
document.getElementById("successSound");

const searchInput =
document.getElementById("search");

/* CUSTOM PHOTO */

let customPhoto = "";

document
.getElementById("photo")
.addEventListener(
"change",
function(e){

    const file =
    e.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload =
    function(event){

        customPhoto =
        event.target.result;

        avatar.src =
        customPhoto;

    };

    reader.readAsDataURL(file);

});

/* LIVE ROBLOX AVATAR */

async function updateAvatar(username){

    try{

        const response =
        await fetch(
        "https://users.roblox.com/v1/usernames/users",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                usernames:[username]
            })
        });

        const data =
        await response.json();

        if(!data.data.length){

            avatar.src =
            "https://tr.rbxcdn.com/30DAY-AvatarHeadshot-310x310-Png/placeholder/Png/noFilter";

            return;

        }

        const userId =
        data.data[0].id;

        avatar.src =
        `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=420&height=420&format=png`;

    }catch(err){

        console.log(err);

    }

}

/* INPUT EVENT */

usernameInput.addEventListener(
"input",
function(){

    const username =
    usernameInput.value.trim();

    previewName.innerText =
    username || "Roblox User";

    if(username.length > 2){

        updateAvatar(username);

    }

});

/* SAVE ACCOUNT */

function saveAccount(){

    const username =
    document.getElementById("username")
    .value.trim();

    const bio =
    document.getElementById("bio")
    .value.trim();

    if(!username || !bio){

        alert("Isi username dan bio!");
        return;

    }

    let accounts =
    JSON.parse(
    localStorage.getItem(
    "roblox_profiles")) || [];

    accounts.push({

        username,
        bio,

        avatar:
        customPhoto || avatar.src

    });

    localStorage.setItem(
    "roblox_profiles",
    JSON.stringify(accounts)
    );

    successSound.play();

    document.getElementById("username").value="";
    document.getElementById("bio").value="";
    document.getElementById("photo").value="";

    customPhoto = "";

    previewName.innerText =
    "Roblox User";

    avatar.src =
    "https://tr.rbxcdn.com/30DAY-AvatarHeadshot-310x310-Png/placeholder/Png/noFilter";

    loadAccounts();

}

/* DELETE */

function deleteAccount(index){

    let accounts =
    JSON.parse(
    localStorage.getItem(
    "roblox_profiles")) || [];

    accounts.splice(index,1);

    localStorage.setItem(
    "roblox_profiles",
    JSON.stringify(accounts)
    );

    loadAccounts();

}

/* LOAD */

function loadAccounts(){

    const accounts =
    JSON.parse(
    localStorage.getItem(
    "roblox_profiles")) || [];

    totalAccounts.innerText =
    accounts.length;

    const container =
    document.getElementById("accounts");

    container.innerHTML = "";

    const keyword =
    searchInput.value.toLowerCase();

    const filtered =
    accounts.filter(acc =>
    acc.username.toLowerCase()
    .includes(keyword));

    if(filtered.length === 0){

        container.innerHTML = `

        <div class="empty">

            Belum ada profile Roblox.

        </div>

        `;

        return;

    }

    filtered.forEach((acc,index)=>{

        container.innerHTML += `

        <div class="card">

            <img src="${acc.avatar}">

            <h3>${acc.username}</h3>

            <div class="bio">

                ${acc.bio}

            </div>

            <a
            class="visit-btn"
            href="https://www.roblox.com/users/profile?username=${acc.username}"
            target="_blank">

                🚀 Lihat Profil

            </a>

            <button
            class="delete-btn"
            onclick="deleteAccount(${index})">

                Hapus

            </button>

        </div>

        `;

    });

}

/* SEARCH */

searchInput.addEventListener(
"input",
loadAccounts);

/* INIT */

loadAccounts();

</script>

</body>
</html>
